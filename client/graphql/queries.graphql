query receivedFriendshipRequestsFromUser($userId: String!) {
	receivedFriendshipRequestsFromUser(userId: $userId) {
		...FriendshipRequestFragment
	}
}

query sentFriendshipRequestsToUser($userId: String!) {
	sentFriendshipRequestsToUser(userId: $userId) {
		...FriendshipRequestFragment
	}
}

query solveByShareCode($shareCode: String) {
	solveByShareCode(shareCode: $shareCode) {
		...SolveWithUserFragment
	}
}

query profile($username: String) {
	profile(username: $username) {
		...ProfileFragment
	}
}

query userSearch($pageArgs: PaginationArgsInput) {
	userSearch(pageArgs: $pageArgs) {
		hasMore
		total
		items {
			...PublicUserFragment
		}
	}
}

query adminUserSearch($pageArgs: PaginationArgsInput) {
	adminUserSearch(pageArgs: $pageArgs) {
		hasMore
		total
		items {
			...UserAccountFragment
		}
	}
}

query getActiveAnnouncements {
	getActiveAnnouncements {
		id
		title
		content
		category
		priority
		imageUrl
		createdAt
		hasViewed
	}
}

query getUnreadAnnouncementCount {
	getUnreadAnnouncementCount {
		count
	}
}

query getAllAnnouncements($filter: AnnouncementFilterInput) {
	getAllAnnouncements(filter: $filter) {
		id
		title
		content
		category
		priority
		imageUrl
		isDraft
		isActive
		createdAt
		publishedAt
		viewCount
	}
}

query getMyAnnouncementHistory($limit: Int!, $offset: Int!) {
	getMyAnnouncementHistory(limit: $limit, offset: $offset) {
		id
		title
		content
		category
		priority
		imageUrl
		createdAt
	}
}

query trainerAlternatives($category: String!, $caseName: String!) {
	trainerAlternatives(category: $category, caseName: $caseName) {
		id
		algorithm
		original_input
		setup
		ll_pattern
		created_at
	}
}

query adminTrainerAlternatives($category: String, $page: Int, $pageSize: Int) {
	adminTrainerAlternatives(category: $category, page: $page, pageSize: $pageSize) {
		items {
			id
			category
			subset
			case_name
			algorithm
			original_input
			user_id
			created_at
		}
		total
		hasMore
	}
}
