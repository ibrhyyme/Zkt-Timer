query receivedFriendshipRequestsFromUser($userId: String!) {
	receivedFriendshipRequestsFromUser(userId: $userId) {
		...FriendshipRequestFragment
	}
}

query sentFriendshipRequestsToUser($userId: String!) {
	sentFriendshipRequestsToUser(userId: $userId) {
		...FriendshipRequestFragment
	}
}

query solveByShareCode($shareCode: String) {
	solveByShareCode(shareCode: $shareCode) {
		...SolveWithUserFragment
	}
}

query profile($username: String) {
	profile(username: $username) {
		...ProfileFragment
	}
}

query userSearch($pageArgs: PaginationArgsInput) {
	userSearch(pageArgs: $pageArgs) {
		hasMore
		total
		items {
			...PublicUserFragment
		}
	}
}

query adminUserSearch($pageArgs: PaginationArgsInput) {
	adminUserSearch(pageArgs: $pageArgs) {
		hasMore
		total
		items {
			...UserAccountFragment
		}
	}
}

query getActiveAnnouncements {
	getActiveAnnouncements {
		id
		title
		content
		category
		priority
		imageUrl
		createdAt
		hasViewed
	}
}

query getUnreadAnnouncementCount {
	getUnreadAnnouncementCount {
		count
	}
}

query getAllAnnouncements($filter: AnnouncementFilterInput) {
	getAllAnnouncements(filter: $filter) {
		id
		title
		content
		category
		priority
		imageUrl
		isDraft
		isActive
		createdAt
		publishedAt
		viewCount
	}
}

query getMyAnnouncementHistory($limit: Int!, $offset: Int!) {
	getMyAnnouncementHistory(limit: $limit, offset: $offset) {
		id
		title
		content
		category
		priority
		imageUrl
		createdAt
	}
}

query trainerAlternatives($category: String!, $caseName: String!) {
	trainerAlternatives(category: $category, caseName: $caseName) {
		id
		algorithm
		original_input
		setup
		ll_pattern
		created_at
	}
}

query wcaCompetitions($filter: WcaCompetitionFilterInput) {
	wcaCompetitions(filter: $filter) {
		id
		name
		city
		country_iso2
		venue
		start_date
		end_date
		date_range
		event_ids
		latitude_degrees
		longitude_degrees
		url
		competitor_limit
	}
}

query wcaSearchCompetitions($query: String!) {
	wcaSearchCompetitions(query: $query) {
		id
		name
		city
		country_iso2
		start_date
		end_date
		url
	}
}

query myWcaCompetitions {
	myWcaCompetitions {
		id
		name
		city
		country_iso2
		start_date
		end_date
		url
	}
}

query wcaCompetitionDetail($input: WcaScheduleInput!) {
	wcaCompetitionDetail(input: $input) {
		competitionId
		competitionName
		myWcaId
		myRegistrationStatus
		myRegisteredEvents
		competitors {
			name
			wcaId
			country
			avatar
			registrantId
			wcaUserId
			registeredEvents
			assignments {
				activityCode
				eventName
				roundNumber
				groupNumber
				assignmentCode
				startTime
				endTime
				stationNumber
				roomName
			}
			personalBests {
				eventId
				type
				best
				worldRanking
				continentalRanking
				nationalRanking
			}
		}
		events {
			eventId
			eventName
			rounds {
				roundNumber
				format
				timeLimit
				cutoff
				cutoffAttempts
				advancementType
				advancementLevel
				groups {
					groupNumber
					activityCode
					startTime
					endTime
					competitors {
						name
						wcaId
						registrantId
						assignmentCode
						seedResult
					}
				}
			}
		}
		schedule {
			date
			assignments {
				activityCode
				eventName
				roundNumber
				groupNumber
				assignmentCode
				startTime
				endTime
				roomName
				roomColor
				venueName
				stationNumber
			}
		}
		allPersonalBests {
			name
			wcaId
			registrantId
			eventId
			single
			average
			singleWorldRank
			averageWorldRank
		}
		wcaLiveCompId
		wcaLiveCompetitors {
			wcaId
			liveId
		}
		info {
			venues {
				name
				address
				city
			}
			organizers {
				name
				wcaId
				role
				avatar
			}
			delegates {
				name
				wcaId
				role
				avatar
			}
			wcaUrl
		}
	}
}

query adminTrainerAlternatives($category: String, $page: Int, $pageSize: Int) {
	adminTrainerAlternatives(category: $category, page: $page, pageSize: $pageSize) {
		items {
			id
			category
			subset
			case_name
			algorithm
			original_input
			user_id
			created_at
		}
		total
		hasMore
	}
}
