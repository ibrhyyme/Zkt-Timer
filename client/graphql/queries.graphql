query wcaCompetitionDetail($input: WcaScheduleInput!) {
	wcaCompetitionDetail(input: $input) {
		competitionId
		competitionName
		myWcaId
		myRegistrationStatus
		myRegisteredEvents
		competitors {
			name
			wcaId
			country
			avatar
			registrantId
			wcaUserId
			registeredEvents
			assignments {
				activityCode
				eventName
				roundNumber
				groupNumber
				assignmentCode
				startTime
				endTime
				stationNumber
				roomName
			}
			personalBests {
				eventId
				type
				best
				worldRanking
				continentalRanking
				nationalRanking
			}
		}
		events {
			eventId
			eventName
			rounds {
				roundNumber
				format
				timeLimit
				cutoff
				cutoffAttempts
				advancementType
				advancementLevel
				groups {
					groupNumber
					activityCode
					startTime
					endTime
					competitors {
						name
						wcaId
						registrantId
						assignmentCode
						seedResult
					}
				}
			}
		}
		schedule {
			date
			assignments {
				activityCode
				eventName
				roundNumber
				groupNumber
				assignmentCode
				startTime
				endTime
				roomName
				roomColor
				venueName
				stationNumber
			}
		}
		allPersonalBests {
			name
			wcaId
			registrantId
			eventId
			single
			average
			singleWorldRank
			averageWorldRank
		}
		wcaLiveCompId
		wcaLiveCompetitors {
			wcaId
			liveId
			name
		}
		wcaLiveRoundMap {
			activityCode
			liveRoundId
		}
		info {
			venues {
				name
				address
				city
			}
			organizers {
				name
				wcaId
				role
				avatar
			}
			delegates {
				name
				wcaId
				role
				avatar
			}
			wcaUrl
		}
	}
}

query wcaLiveCompetitionOverview($input: WcaLiveOverviewInput!) {
	wcaLiveCompetitionOverview(input: $input) {
		compId
		name
		events {
			eventId
			eventName
			rounds {
				liveRoundId
				number
				name
				open
				finished
				active
				numEntered
				numResults
				format {
					numberOfAttempts
					sortBy
				}
				timeLimit {
					centiseconds
					cumulativeRoundWcifIds
				}
				cutoff {
					attemptResult
					numberOfAttempts
				}
				advancementCondition {
					type
					level
				}
			}
		}
		schedule {
			name
			rooms {
				name
				color
				activities {
					activityId
					name
					activityCode
					startTime
					endTime
				}
			}
		}
		records {
			type
			tag
			eventId
			eventName
			attemptResult
			personName
			personCountryIso2
			roundNumber
		}
		podiums {
			eventId
			eventName
			sortBy
			entries {
				ranking
				personName
				personCountryIso2
				best
				average
				singleRecordTag
				averageRecordTag
			}
		}
	}
}

query wcaLiveRoundResults($input: WcaLiveRoundInput!) {
	wcaLiveRoundResults(input: $input) {
		roundActivityCode
		roundName
		active
		finished
		numberOfAttempts
		sortBy
		results {
			ranking
			best
			average
			attempts {
				result
			}
			personName
			personWcaId
			personCountryIso2
			personLiveId
			singleRecordTag
			averageRecordTag
			advancing
			advancingQuestionable
		}
	}
}

query wcaLiveCompetitorResults($input: WcaLiveCompetitorInput!) {
	wcaLiveCompetitorResults(input: $input) {
		personName
		personWcaId
		personCountryIso2
		results {
			eventId
			eventName
			roundNumber
			roundName
			ranking
			best
			average
			attempts {
				result
			}
			singleRecordTag
			averageRecordTag
