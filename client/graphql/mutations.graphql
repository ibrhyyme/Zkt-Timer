mutation updateSiteConfig($input: UpdateSiteConfigInput!) {
	updateSiteConfig(input: $input) {
		id
		maintenance_mode
		trainer_enabled
		community_enabled
		leaderboards_enabled
		rooms_enabled
		battle_enabled
		updated_at
	}
}

mutation mergeSessions($oldSessionId: String, $newSessionId: String) {
	mergeSessions(oldSessionId: $oldSessionId, newSessionId: $newSessionId) {
		...SessionFragment
	}
}

mutation createSession($input: SessionInput) {
	createSession(input: $input) {
		...SessionFragment
	}
}

mutation updateSession($id: String, $input: SessionInput) {
	updateSession(id: $id, input: $input) {
		...SessionFragment
	}
}

mutation deleteSession($id: String) {
	deleteSession(id: $id) {
		...SessionFragment
	}
}

mutation reorderSessions($ids: [String]!) {
	reorderSessions(ids: $ids)
}

mutation createAnnouncement($input: CreateAnnouncementInput!) {
	createAnnouncement(input: $input) {
		id
		title
		category
		isDraft
	}
}

mutation updateAnnouncement($id: String!, $input: UpdateAnnouncementInput!) {
	updateAnnouncement(id: $id, input: $input) {
		id
		title
		category
		isDraft
	}
}

mutation markAnnouncementAsViewed($announcementId: String!) {
	markAnnouncementAsViewed(announcementId: $announcementId)
}

mutation deleteAnnouncement($id: String!) {
	deleteAnnouncement(id: $id)
}

mutation createTrainerAlternative($input: TrainerAlternativeCreateInput!) {
	createTrainerAlternative(input: $input) {
		id
		algorithm
		original_input
		setup
		ll_pattern
	}
}

mutation adminDeleteTrainerAlternative($id: String!) {
	adminDeleteTrainerAlternative(id: $id) {
		id
	}
}

mutation backfillWcaIds {
	backfillWcaIds {
		total
		filled
		tokenFailed
		noWcaId
		error
		recordsTotal
		recordsFilled
		recordsError
	}
}
