mutation updateSiteConfig($input: UpdateSiteConfigInput!) {
	updateSiteConfig(input: $input) {
		id
		maintenance_mode
		trainer_enabled
		community_enabled
		leaderboards_enabled
		rooms_enabled
		battle_enabled
		pro_enabled
		featureOverrides {
			feature
			mode
			users {
				id
				username
			}
		}
		updated_at
	}
}

mutation mergeSessions($oldSessionId: String, $newSessionId: String) {
	mergeSessions(oldSessionId: $oldSessionId, newSessionId: $newSessionId) {
		...SessionFragment
	}
}

mutation createSession($input: SessionInput) {
	createSession(input: $input) {
		...SessionFragment
	}
}

mutation updateSession($id: String, $input: SessionInput) {
	updateSession(id: $id, input: $input) {
		...SessionFragment
	}
}

mutation deleteSession($id: String) {
	deleteSession(id: $id) {
		...SessionFragment
	}
}

mutation reorderSessions($ids: [String]!) {
	reorderSessions(ids: $ids)
}

