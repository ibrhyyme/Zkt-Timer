services:
  app-server:
    build:
      context: .
      args:
        RELEASE_NAME: ${RELEASE_NAME:-dev}
    container_name: zkt-timer-app-server-1
    env_file:
      - .env
    volumes:
      # Sadece kullanıcı yüklediği dosyaları persist et
      - ./public/uploads:/app/public/uploads
      # Firebase service account (push notifications için)
      - ./server/config/firebase-service-account.json:/app/firebase-service-account.json:ro
    ports:
      - "127.0.0.1:3000:3000"
    restart: always
    environment:
      - NODE_ENV=production
      - HOST=0.0.0.0
      - PORT=3000
      - RELEASE_NAME=${RELEASE_NAME:-dev}
    depends_on:
      - postgres
      - redis
      - elasticsearch

  postgres:
    image: postgres:14
    container_name: zkt-timer-postgres-1
    environment:
      # Production'da .env icinden DB_USER + DB_PASSWORD set et.
      # Eski "root/root" geriye-uyumluluk default — yeni deploy'larda override edilmeli.
      POSTGRES_DB: ${DB_NAME:-Zkt-Timer}
      POSTGRES_USER: ${DB_USER:-root}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-root}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: zkt-timer-redis-1
    # Redis sadece Docker network icinde erisilebilir; yine de defansif olarak
    # production'da REDIS_PASSWORD set edilirse auth ile baslat
    command: ["sh", "-c", "if [ -n \"$$REDIS_PASSWORD\" ]; then redis-server --requirepass \"$$REDIS_PASSWORD\"; else redis-server; fi"]
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.2
    container_name: zkt-timer-elasticsearch-1
    environment:
      - discovery.type=single-node
      # xpack.security: production'da auth zorunlu. Bos birakilirsa eski davranis korunur (geriye uyumluluk).
      - xpack.security.enabled=${ES_SECURITY_ENABLED:-false}
      - ELASTIC_PASSWORD=${ES_PASSWORD:-}
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"

volumes:
  postgres_data:
  redis_data:
  npm_cache:
  yarn_cache:
