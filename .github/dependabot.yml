# Dependabot — SADECE tarama, PR YOK (open-pull-requests-limit: 0).
# Felsefe: bot PR'ı istemiyoruz; güncellemeleri elle, kontrollü yapıyoruz çünkü
# cubing.js / Capacitor / React ekosistemi sürüm kilitli ve Capacitor minor bump'ı
# bile native tarafı (pod/gradle) değiştirip yeni store build gerektirebiliyor.
# Güvenlik AÇIĞI alarmları bu dosyadan bağımsızdır (Security sekmesi) ve çalışmaya
# devam eder; kritik bir alarm gelirse o paketi elle güncelleriz.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 0
