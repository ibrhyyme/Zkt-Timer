name: Security Scan (Trivy)

# Repo public'e açıldığı için: bağımlılık açıkları (CVE), yanlış Docker/compose
# ayarları ve yanlışlıkla koda karışmış secret'ları tarar.
# - Bulgular GitHub "Security" sekmesine yazılır (bilgi amaçlı, build'i bloke etmez).
# - Sızmış bir secret bulunursa iş HARD FAIL olur (asıl tehlike bu).

on:
  push:
    branches: [ main ]        # deploy gibi: sadece main'e merge edilince tarar
  schedule:
    # Her Pazartesi 06:00 UTC — kod değişmese de yeni CVE'ler için haftalık tarama
    - cron: '0 6 * * 1'
  workflow_dispatch:          # GitHub'dan elle tetikleme

permissions:
  contents: read
  security-events: write   # SARIF sonuçlarını Security sekmesine yüklemek için

jobs:
  trivy:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1) Tam tarama -> SARIF -> Security sekmesi (bilgilendirme, bloke etmez)
      - name: Trivy scan (report)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL,HIGH,MEDIUM
          format: sarif
          output: trivy-results.sarif
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload results to Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true   # repo public olana kadar upload başarısız olabilir; workflow'u bozmasın
        with:
          sarif_file: trivy-results.sarif

      # 2) Secret gate -> sızmış secret varsa iş BAŞARISIZ olsun ("ruslar" senaryosu)
      - name: Trivy secret gate (hard fail)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          format: table
          exit-code: '1'
