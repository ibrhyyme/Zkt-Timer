name: Android Play Store Deploy

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and upload to Play Store Internal Track
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: GraphQL codegen
        run: npx graphql-codegen

      # Faz 2: the built web app ships INSIDE the binary (webDir native-bundle), so the
      # esbuild-inlined env must match production — without these the bundle would point
      # at localhost with Pro disabled and empty Firebase/RevenueCat keys.
      - name: Build web app
        env:
          DEPLOYING: 'true'
          NODE_ENV: production
          BASE_URI: 'https://zktimer.app'
          PRO_ENABLED: 'true'
          RELEASE_NAME: ${{ github.sha }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_VAPID_KEY: ${{ secrets.FIREBASE_VAPID_KEY }}
          WCA_CLIENT_ID: ${{ secrets.WCA_CLIENT_ID }}
          REVENUECAT_ANDROID_KEY: ${{ secrets.REVENUECAT_ANDROID_KEY }}
          REVENUECAT_IOS_KEY: ${{ secrets.REVENUECAT_IOS_KEY }}
        run: yarn build

      - name: Assemble native bundle (webDir)
        env:
          RELEASE_NAME: ${{ github.sha }}
        run: yarn bundle:native

      - name: Capacitor sync Android
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Decode keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          KEYSTORE_PATH="$RUNNER_TEMP/release.keystore"
          echo -n "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> $GITHUB_ENV

      - name: Write Play Store JSON key
        env:
          PLAY_STORE_JSON_KEY: ${{ secrets.PLAY_STORE_JSON_KEY }}
        run: |
          JSON_PATH="$RUNNER_TEMP/play-store-key.json"
          echo "$PLAY_STORE_JSON_KEY" > "$JSON_PATH"
          echo "PLAY_STORE_JSON_KEY_PATH=$JSON_PATH" >> $GITHUB_ENV

      - name: Install fastlane
        run: gem install fastlane -NV

      - name: Fastlane beta
        working-directory: android
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          FASTLANE_DISABLE_COLORS: 1
        run: fastlane beta

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: App-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: ignore
          retention-days: 7
