name: ZKTimer Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to GCP
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/ibrahimyldz77/Zkt-Timer
          
          # 1. Yeni kodu çek
          git fetch --all
          git reset --hard origin/main
          
          # 2. Container'ları yeniden build et
          docker compose build --no-cache app-server
          
          # 2.5. Frontend dosyalarını host'a kopyala (Nginx için)
          # Geçici bir container oluşturup içindeki /dist klasörünü dışarı alıyoruz
          docker create --name temp_extract zkt-timer-app-server-1
          rm -rf dist_new
          docker cp temp_extract:/app/dist ./dist_new
          docker rm temp_extract
          
          # Yeni dosyaları yerine koy (kesinti olmaması için atomik işlem yapmaya çalışıyoruz)
          rm -rf dist
          mv dist_new dist
          
          # 3. Servisleri yeniden başlat
          docker compose down
          docker compose up -d
          
          # 3. İzinleri düzelt
          sudo chmod -R 755 public/uploads/
          
          # 4. Nginx'i yenile
          sudo systemctl reload nginx
          
          # 5. Container loglarını kontrol et
          echo "Deployment tamamlandı! Container durumu:"
          docker compose ps
