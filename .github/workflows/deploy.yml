name: ZKTimer Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to GCP via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/ibrahimyldz77/Zkt-Timer
          
          # 1. Yeni kodları çek (Sadece kod değişir, .env korunur)
          git pull origin main
          
          # 2. Docker Compose'u güncelle (Eğer yml dosyası değiştiyse)
          sudo docker compose up -d --remove-orphans
          
          # 3. Konteyner içinde build işlemini başlat (Kek fırına veriliyor)
          # Servis adının 'app-server' olduğundan emin ol
          sudo docker exec zkt-timer-app-server-1 sh -c "yarn build"
          
          # 4. Dosya izinlerini tazele (Nginx'in okuyabilmesi için)
          sudo chmod -R 755 dist/ public/
          
          # 5. Uygulamayı yeni dosyalarla başlat
          sudo docker compose restart app-server