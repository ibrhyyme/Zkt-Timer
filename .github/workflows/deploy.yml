name: ZKTimer Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Deploy to GCP
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.REMOTE_HOST }}
        username: ${{ secrets.REMOTE_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd /home/ibrahimyldz77/Zkt-Timer
          
          # 1. Çakışmaları temizle ve GitHub'daki sürümü zorla çek
          git fetch --all
          git reset --hard origin/main
          
          # 2. Docker Compose'u başlat
          docker compose up -d
          
          # 3. Build işlemini başlat
          docker exec zkt-timer-app-server-1 sh -c "yarn build"
          
          # 4. İzinleri düzelt (Sudo artık şifre istemeyecek)
          sudo chmod -R 755 dist/ public/
          
          # 5. Nginx ve App'i tazele
          sudo systemctl restart nginx
          docker compose restart app-server
