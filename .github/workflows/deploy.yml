name: ZKTimer Otomatik Guncelleme

on:
  push:
    branches:
      - main  # Eğer ana dalın adı 'master' ise burayı master yap

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sunucuya Baglan ve Guncelle
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /home/ibrahimyldz77/Zkt-Timer
            git pull origin main
            npm install
            # Uygulamayı yeniden başlatmak için pm2 komutu
            pm2 restart all || npm start