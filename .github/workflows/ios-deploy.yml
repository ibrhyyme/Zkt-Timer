name: iOS TestFlight Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'client/**'
      - 'ios/**'
      - 'shared/**'
      - 'package.json'
      - 'yarn.lock'
      - '.github/workflows/ios-deploy.yml'

jobs:
  build-and-deploy:
    name: Build and upload to TestFlight
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: GraphQL codegen
        run: npx graphql-codegen

      - name: Build web app
        run: yarn build

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Install fastlane
        run: gem install fastlane -NV

      - name: Write App Store Connect API Key
        env:
          API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys/
          printf '%s' "$API_KEY_CONTENT" > ~/fastlane_api_key.p8
          cp ~/fastlane_api_key.p8 ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          chmod 600 ~/fastlane_api_key.p8

      - name: Fastlane beta
        working-directory: ios/App
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          FASTLANE_DISABLE_COLORS: 1
        run: fastlane beta

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: App-ipa
          path: ios/App/App.ipa
          if-no-files-found: ignore
          retention-days: 7
