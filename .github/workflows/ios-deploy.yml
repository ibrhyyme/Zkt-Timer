name: iOS TestFlight Deploy

on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    name: Build and upload to TestFlight
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: false

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: GraphQL codegen
        run: npx graphql-codegen

      - name: Build web app
        env:
          DEPLOYING: 'true'
          NODE_ENV: production
        run: yarn build

      - name: Capacitor sync iOS
        run: npx cap sync ios

      - name: Setup signing keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          echo "MATCH_KEYCHAIN_NAME=$KEYCHAIN_PATH" >> $GITHUB_ENV
          echo "MATCH_KEYCHAIN_PASSWORD=$KEYCHAIN_PASSWORD" >> $GITHUB_ENV
          echo "FASTLANE_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

          if [ -n "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "Importing existing distribution certificate from secret..."
            CERT_PATH="$RUNNER_TEMP/distribution.p12"
            echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
            security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
            security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
            echo "SKIP_FASTLANE_CERT=true" >> $GITHUB_ENV
          else
            echo "No existing certificate secret found - fastlane cert will create a new one"
          fi

      - name: Install fastlane
        run: gem install fastlane -NV

      - name: Write App Store Connect API Key
        env:
          API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys/
          printf '%s' "$API_KEY_CONTENT" > ~/fastlane_api_key.p8
          cp ~/fastlane_api_key.p8 ~/.appstoreconnect/private_keys/AuthKey_${API_KEY_ID}.p8
          chmod 600 ~/fastlane_api_key.p8

      - name: Fastlane beta
        working-directory: ios/App
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          FASTLANE_DISABLE_COLORS: 1
        run: fastlane beta

      - name: Export certificate for future runs
        if: success() && env.SKIP_FASTLANE_CERT != 'true'
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          P12_EXPORT_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          EXPORT_DIR="$RUNNER_TEMP/cert-export"
          mkdir -p "$EXPORT_DIR"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Apple Distribution" | head -1 | awk -F'"' '{print $2}')
          echo "Found identity: $IDENTITY"

          security export -k "$KEYCHAIN_PATH" -t identities -f pkcs12 -P "$P12_EXPORT_PASSWORD" -o "$EXPORT_DIR/distribution.p12"

          base64 -i "$EXPORT_DIR/distribution.p12" -o "$EXPORT_DIR/distribution.p12.base64"

          echo "==============================================="
          echo "CERTIFICATE EXPORTED - download the artifact and add these secrets:"
          echo "  BUILD_CERTIFICATE_BASE64 = contents of distribution.p12.base64"
          echo "  P12_PASSWORD = value of KEYCHAIN_PASSWORD secret"
          echo "==============================================="

      - name: Upload exported certificate
        if: success() && env.SKIP_FASTLANE_CERT != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: distribution-certificate
          path: ${{ runner.temp }}/cert-export/
          retention-days: 1

      - name: Upload IPA artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: App-ipa
          path: ios/App/App.ipa
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload gym logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gym-logs
          path: |
            /Users/runner/Library/Logs/gym/
            ios/App/fastlane/report.xml
          if-no-files-found: ignore
          retention-days: 7
